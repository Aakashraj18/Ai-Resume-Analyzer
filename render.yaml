services:
  # Backend API Service
  - type: web
    name: ats-genius-api
    env: node
    buildCommand: npm install --include=dev
    startCommand: npx tsx server/index.ts
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false # You must set this in the Render dashboard!
      - key: JWT_SECRET
        sync: false # You must set this in the Render dashboard!
      - key: JWT_EXPIRES_IN
        sync: false # You must set this in the Render dashboard!
      - key: GEMINI_API_KEY
        sync: false # You must set this in the Render dashboard!

  # Frontend Web App Service
  - type: web
    name: ats-genius-frontend
    env: node
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: VITE_API_URL
        fromService:
          type: web
          name: ats-genius-api
          envVarKey: RENDER_EXTERNAL_URL
