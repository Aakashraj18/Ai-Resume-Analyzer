services:
  - type: web
    name: ats-genius
    env: node
    buildCommand: npm install --include=dev && npm run build
    startCommand: npx tsx server/index.ts
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false # You must set this in the Render dashboard!
      - key: JWT_SECRET
        sync: false # You must set this in the Render dashboard!
      - key: JWT_EXPIRES_IN
        sync: false # You must set this in the Render dashboard!
      - key: GEMINI_API_KEY
        sync: false # You must set this in the Render dashboard!
